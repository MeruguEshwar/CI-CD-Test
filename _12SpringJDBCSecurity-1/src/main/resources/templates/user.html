<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
	integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
	crossorigin="anonymous">
</head>
<body>
	<h3>UserRegister Page</h3>
	<form action="save" method="post">
		<div class="mb-3">
			<label for="formGroupExampleInput" class="form-label">Name</label> <input
				type="text" class="form-control" name="name" id="formGroupExampleInput"
				placeholder="Enter Your Name:">
		</div>
		<div class="mb-3">
			<label for="formGroupExampleInput2" class="form-label">Email
			</label> <input type="text" name="email" class="form-control"
				id="formGroupExampleInput2" placeholder="Enter Your Email">
		</div>
		<div class="mb-3">
			<label for="formGroupExampleInput2" class="form-label">PassWord
			</label> <input type="text" class="form-control"  name="pwd"
				id="formGroupExampleInput2" placeholder="Enter Your Password">
		</div>

		<div class="form-check">
		<h5>Roles:</h5>
			<input class="form-check-input" type="checkbox" value="admin"
				id="flexCheckDefault" name="roles"> <label class="form-check-label"
				for="flexCheckDefault">Admin </label>
		</div>
		<div class="form-check">
			<input class="form-check-input" type="checkbox" value="user"
				id="flexCheckChecked" name="roles" checked> <label
				class="form-check-label" for="flexCheckChecked"> User</label>
		</div>

		<div class="col-auto">
			<button type="submit" class="btn btn-primary">Add User</button>
		</div>
	</form>
	<div th:text="${message}"></div>
</body>
</html>
